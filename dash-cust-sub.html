<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription - Customer</title>
  <link rel="stylesheet" href="css/dashboard-new.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/dashboard.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dash-body">
<div class="dash-overlay" id="dashOverlay"></div>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dashSidebar">
    <!-- Dynamically populated by js/dashboard.js -->
    <div class="dash-sidebar-header">
      <span class="dash-sidebar-brand-text" style="color:white; font-size:1.2rem; font-weight:bold;">STACKLY AI</span>
      <button class="dash-collapse-btn" id="collapseBtn" title="Toggle Sidebar"><span class="collapse-icon">&lt;&lt;</span></button>
    </div>
  </aside>
  <div class="dash-main" id="dashMain">
    <header class="dash-topbar" data-title="Subscription" data-subtitle="Configure subscription settings">
      <!-- Dynamically populated by js/dashboard.js -->
    </header>
    <div class="dash-content">
      <div class="dash-chart-card" style="padding:2rem;">
        <h3>Pro Plan Active</h3>
        <p style="color:#888;">$29/month. Your plan renews automatically on July 5, 2026.</p>
        <button style="background:#6C63FF;color:white;border:none;padding:10px 20px;margin-top:15px;border-radius:5px;">Manage Billing</button>
      </div>
    </div>
  
<div class="dash-table-card mt-4" style="margin-top: 2rem; padding: 2rem;">
  <h3>Available Upgrades</h3>
  <div style="display: flex; gap: 1rem; margin-top: 1rem;">
    <div style="flex: 1; border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 8px;">
      <h4>Enterprise Plan</h4>
      <p>Custom limits, dedicated support, and SLA.</p>
      <button class="btn-sm-outline" style="background:#6C63FF;color:white;border:none;margin-top:10px;">Contact Sales</button>
    </div>
    <div style="flex: 1; border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 8px;">
      <h4>Add-on: Advanced Analytics</h4>
      <p>Deep insights into your API usage and AI responses.</p>
      <button class="btn-sm-outline" style="background:#6C63FF;color:white;border:none;margin-top:10px;">Add for $49/mo</button>
    </div>
  </div>
</div>
</div>
</div>

</body>
</html>
