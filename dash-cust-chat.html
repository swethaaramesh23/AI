<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat History - Customer</title>
  <link rel="stylesheet" href="css/dashboard-new.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/dashboard.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dash-body">
<div class="dash-overlay" id="dashOverlay"></div>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dashSidebar">
    <!-- Dynamically populated by js/dashboard.js -->
    <div class="dash-sidebar-header">
      <span class="dash-sidebar-brand-text" style="color:white; font-size:1.2rem; font-weight:bold;">STACKLY AI</span>
      <button class="dash-collapse-btn" id="collapseBtn" title="Toggle Sidebar"><span class="collapse-icon">&lt;&lt;</span></button>
    </div>
  </aside>
  <div class="dash-main" id="dashMain">
    <header class="dash-topbar" data-title="Chat History" data-subtitle="Configure chat history settings">
      <!-- Dynamically populated by js/dashboard.js -->
    </header>
    <div class="dash-content">
      <div class="dash-table-card">
        <table class="dash-table" style="width:100%;">
          <tr><th>Session Name</th><th>Messages</th><th>Date</th></tr>
          <tr><td>Brainstorming Marketing Ideas</td><td>34</td><td>Today</td></tr>
          <tr><td>Drafting Email Newsletter</td><td>12</td><td>Yesterday</td></tr>
          <tr><td>Python Script Debugging</td><td>45</td><td>June 12, 2026</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
