<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhooks - Developer</title>
  <link rel="stylesheet" href="css/dashboard-new.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/dashboard.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dash-body">
<div class="dash-overlay" id="dashOverlay"></div>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dashSidebar">
    <!-- Dynamically populated by js/dashboard.js -->
    <div class="dash-sidebar-header">
      <span class="dash-sidebar-brand-text" style="color:white; font-size:1.2rem; font-weight:bold;">STACKLY AI</span>
      <button class="dash-collapse-btn" id="collapseBtn" title="Toggle Sidebar"><span class="collapse-icon">&lt;&lt;</span></button>
    </div>
  </aside>
  <div class="dash-main" id="dashMain">
    <header class="dash-topbar" data-title="Webhooks" data-subtitle="Configure webhooks settings">
      <!-- Dynamically populated by js/dashboard.js -->
    </header>
    <div class="dash-content">
      <div class="dash-table-card">
        <div class="dash-table-header"><h3>Configured Endpoints</h3><button style="background:#6C63FF;color:white;border:none;padding:5px 10px;border-radius:4px;">Add Endpoint</button></div>
        <table class="dash-table" style="width:100%;">
          <tr><th>URL</th><th>Events</th><th>Status</th></tr>
          <tr><td>https://api.example.com/webhook</td><td>job.completed, job.failed</td><td>Active</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
