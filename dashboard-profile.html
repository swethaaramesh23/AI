<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - STACKLY AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard-new.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="js/dashboard.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dash-body">

<div class="dash-overlay" id="dashOverlay"></div>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dashSidebar">
    <!-- Dynamically populated by js/dashboard.js -->
    <div class="dash-sidebar-header">
      <a href="index.html" class="dash-sidebar-brand"><span class="dash-sidebar-brand-text">STACKLY AI</span></a>
      <button class="dash-collapse-btn" id="collapseBtn"><span class="collapse-icon">&lt;&lt;</span></button>
    </div>
  </aside>

  <div class="dash-main" id="dashMain">
    <header class="dash-topbar" data-title="Profile" data-subtitle="Manage your personal details">
      <!-- Dynamically populated by js/dashboard.js -->
    </header>

    <div class="dash-content">
      <div class="dash-chart-card" style="max-width: 600px; padding: 2rem;">
        <h3>Admin Profile</h3>
        <div style="display:flex; gap:1rem; align-items:center; margin-bottom:2rem; margin-top:1.5rem;">
          <img src="images/3.webp" style="width:80px;height:80px;border-radius:50%; object-fit: cover;">
          <div><button class="btn-sm-outline" style="border: 1px solid #ccc; padding: 8px 16px; border-radius: 4px; background: white; cursor: pointer;">Change Avatar</button></div>
        </div>
        <form style="display:flex; flex-direction:column; gap:1rem;">
          <div><label style="font-weight:500; font-size:0.9rem;">Full Name</label><br><input type="text" value="Admin User" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; margin-top:5px;"></div>
          <div><label style="font-weight:500; font-size:0.9rem;">Email Address</label><br><input type="email" value="admin@stackly.ai" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; margin-top:5px;"></div>
          <button type="button" style="background:#6C63FF;color:white;border:none;padding:12px;border-radius:4px;cursor:pointer;width:150px; margin-top:10px; font-weight:600;">Update Profile</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
