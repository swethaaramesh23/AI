<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects - Customer</title>
  <link rel="stylesheet" href="css/dashboard-new.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/dashboard.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dash-body">
<div class="dash-overlay" id="dashOverlay"></div>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dashSidebar">
    <!-- Dynamically populated by js/dashboard.js -->
    <div class="dash-sidebar-header">
      <span class="dash-sidebar-brand-text" style="color:white; font-size:1.2rem; font-weight:bold;">STACKLY AI</span>
      <button class="dash-collapse-btn" id="collapseBtn" title="Toggle Sidebar"><span class="collapse-icon">&lt;&lt;</span></button>
    </div>
  </aside>
  <div class="dash-main" id="dashMain">
    <header class="dash-topbar" data-title="My Projects" data-subtitle="Configure projects settings">
      <!-- Dynamically populated by js/dashboard.js -->
    </header>
    <div class="dash-content">
      <div style="display:flex; gap:20px; flex-wrap:wrap;">
        <div class="dash-stat-card" style="flex:1; min-width:200px;"><h3>Website Copywriter</h3><p style="color:#888;">Generated 15 articles</p></div>
        <div class="dash-stat-card" style="flex:1; min-width:200px;"><h3>Support Bot Training</h3><p style="color:#888;">Ingested 4 documents</p></div>
        <div class="dash-stat-card" style="flex:1; min-width:200px;"><h3>Image Assets</h3><p style="color:#888;">45 assets generated</p></div>
      </div>
    </div>
  
<div class="dash-table-card mt-4" style="margin-top: 2rem;">
  <div class="dash-table-header">
    <h3>Completed Projects</h3>
  </div>
  <div class="dash-table-wrap">
    <table class="dash-table">
      <thead><tr><th>Project Name</th><th>Status</th><th>Completed On</th></tr></thead>
      <tbody>
        <tr><td>E-commerce Recommendation Engine</td><td><span class="badge-new badge-success">Done</span></td><td>Mar 2026</td></tr>
        <tr><td>Internal HR Chatbot</td><td><span class="badge-new badge-success">Done</span></td><td>Jan 2026</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div>
</div>

</body>
</html>
